# nome da pipeline
name: "Pipeline Completa"

on:
  workflow_dispatch:

  schedule:
    # Executa a cada 6 horas
    - cron: '0 */6 * * *'

    # Executa todos os dias às 21:00 UTC
    - cron: '0 21 * * *'

  push:
    # Branches que ativam a workflow
    branches:
      - main

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # executar os testes
      - name: Executando testes
        run: yarn run test

      # Upload do relatório Mochawesome
      - name: Upload do relatório Mochawesome
        if: hashFiles('reports/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: reports/
